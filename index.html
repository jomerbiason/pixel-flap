<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel Flap</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #70c5ce;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
}

canvas {
  background: #70c5ce;
  border: 2px solid #000;
}
</style>
</head>

<body>
<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// STATES
let state = "menu";
let bird, pipes, frame, score;
let highScore = localStorage.getItem("highScore") || 0;
let menuAnimation = 0;

// GAME SLOW-MOTION FLAG
let waitingForFirstFlap = false;
let firstFlapDone = false;

// PIPE SPAWN CONTROL
let minPipeSpacing = 180;
let maxPipeSpacing = 250;
let lastPipeX = canvas.width;

// RESET GAME
function resetGame() {
  bird = { x: 50, y: 150, width: 20, height: 20, gravity: 0.5, lift: -8, velocity: 0 };
  pipes = [];
  frame = 0;
  score = 0;
  waitingForFirstFlap = true;
  firstFlapDone = false;
  lastPipeX = canvas.width;
}

// DRAW
function drawBird() {
  const angle = Math.min(Math.max(bird.velocity / 10, -0.5), 0.5); // tilt based on velocity
  ctx.save();
  ctx.translate(bird.x + bird.width/2, bird.y + bird.height/2);
  ctx.rotate(angle);
  ctx.fillStyle = 'yellow';
  ctx.fillRect(-bird.width/2, -bird.height/2, bird.width, bird.height);
  ctx.restore();
}

function drawPipes() {
  ctx.fillStyle = 'green';
  pipes.forEach(pipe => {
    const oscillation = Math.sin(frame / 20 + pipe.phase) * pipe.oscAmplitude;
    ctx.fillRect(pipe.x, 0 + oscillation, pipe.width, pipe.top);
    ctx.fillRect(pipe.x, canvas.height - pipe.bottom + oscillation, pipe.width, pipe.bottom);
  });
}

// DRAW SCORE
function drawScore() {
  ctx.font = '20px Arial';
  ctx.fillStyle = 'white';
  ctx.fillText('High Score: ' + highScore, 10, 25);
  ctx.fillText('Score: ' + score, 10, 50);
}

// UPDATE
function updateBird() {
  if (waitingForFirstFlap) {
    bird.velocity += bird.gravity * 0.05;
  } else {
    bird.velocity += bird.gravity;
  }
  bird.velocity = Math.min(bird.velocity, 10);
  bird.y += bird.velocity;

  if (bird.y + bird.height >= canvas.height || bird.y <= 0) {
    state = "gameover";
  }
}

function updatePipes() {
  if (frame % 90 === 0) {
    if (pipes.length === 0 || canvas.width - lastPipeX >= minPipeSpacing) {
      let minTop = 50;
      let maxTop = canvas.height - 50 - 150;
      let top = Math.random() * (maxTop - minTop) + minTop;
      let gap = 150;
      let bottom = canvas.height - top - gap;

      // vertical oscillation
      let oscAmplitude = Math.random() * 15 + 5; // 5–20 px
      let phase = Math.random() * Math.PI * 2;

      pipes.push({ x: canvas.width, width: 40, top, bottom, passed: false, oscAmplitude, phase });

      lastPipeX = canvas.width - Math.random() * (maxPipeSpacing - minPipeSpacing) - minPipeSpacing;
    }
  }

  pipes.forEach(pipe => {
    pipe.x -= waitingForFirstFlap ? 0.2 : 2;

    const oscillation = Math.sin(frame / 20 + pipe.phase) * pipe.oscAmplitude;

    if (
      bird.x < pipe.x + pipe.width &&
      bird.x + bird.width > pipe.x &&
      (bird.y < pipe.top + oscillation || bird.y + bird.height > canvas.height - pipe.bottom + oscillation)
    ) {
      state = "gameover";
    }

    if (!pipe.passed && pipe.x + pipe.width < bird.x) {
      score++;
      pipe.passed = true;
    }
  });

  pipes = pipes.filter(pipe => pipe.x + pipe.width > 0);
  if (pipes.length > 0) lastPipeX = pipes[pipes.length - 1].x;
}

// UI SCREENS
function drawMenu() {
  menuAnimation += 0.03;
  let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
  gradient.addColorStop(0, "#70c5ce");
  gradient.addColorStop(1, "#4ec0ca");
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  let floatY = Math.sin(menuAnimation) * 10;
  ctx.fillStyle = "yellow";
  ctx.fillRect(180, 180 + floatY, 20, 20);

  ctx.globalAlpha = Math.min(1, menuAnimation / 2);
  ctx.fillStyle = "black";
  ctx.font = "40px Arial";
  ctx.fillText("PIXEL FLAP", 80, 120);
  ctx.globalAlpha = 1;

  let pulse = Math.sin(menuAnimation * 3) * 0.5 + 0.5;
  ctx.globalAlpha = 0.5 + pulse * 0.5;
  ctx.font = "22px Arial";
  ctx.fillText("Press any key / tap to start", 50, 300);
  ctx.globalAlpha = 1;

  ctx.font = "18px Arial";
  ctx.fillText("High Score: " + highScore, 10, 25);
}

function drawGameScreen() {
  drawBird();
  drawPipes();
  drawScore();

  if (waitingForFirstFlap) {
    ctx.fillStyle = 'black';
    ctx.font = '22px Arial';
    ctx.fillText("Tap to flap", 140, 550);
  }
}

function drawGameOver() {
  ctx.fillStyle = 'black';
  ctx.font = '30px Arial';
  ctx.fillText('Game Over', 110, 220);

  ctx.font = '20px Arial';
  ctx.fillText('High Score: ' + highScore, 110, 270);
  ctx.fillText('Score: ' + score, 140, 310);

  if (score >= highScore) {
    if (Math.floor(frame / 10) % 2 === 0) {
      ctx.fillStyle = 'red';
      ctx.font = '22px Arial';
      ctx.fillText('NEW HIGH SCORE!', 100, 180);
    }
  }

  // On-screen menu button
  ctx.fillStyle = 'orange';
  ctx.fillRect(150, 420, 100, 40);
  ctx.fillStyle = 'black';
  ctx.font = '18px Arial';
  ctx.fillText('MENU', 180, 447);

  ctx.fillStyle = 'black';
  ctx.font = '20px Arial';
  ctx.fillText('Tap to Restart', 130, 380);
}

// LOOP
function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (state === "menu") drawMenu();
  else if (state === "playing") {
    drawGameScreen();
    updateBird();
    updatePipes();
    frame++;
  } else if (state === "gameover") {
    if (score > highScore) {
      highScore = score;
      localStorage.setItem("highScore", highScore);
    }
    drawGameOver();
  }

  requestAnimationFrame(loop);
}

// CONTROLS
function handleInput(x = null, y = null) {
  if (state === "menu") {
    resetGame();
    state = "playing";
  } else if (state === "playing") {
    if (!firstFlapDone) {
      waitingForFirstFlap = false;
      firstFlapDone = true;
    }
    bird.velocity = bird.lift;
  } else if (state === "gameover") {
    // Check if tap is on MENU button
    if (x !== null && y !== null) {
      if (x >= 150 && x <= 250 && y >= 420 && y <= 460) {
        state = "menu";
        menuAnimation = 0;
        return;
      }
    }
    resetGame();
    state = "playing";
  }
}

// keyboard input
window.addEventListener('keydown', (e) => {
  if (e.key.toLowerCase() === 'b') {
    state = "menu";
    menuAnimation = 0;
  } else handleInput();
});

// mouse/touch input
window.addEventListener('click', (e) => {
  handleInput(e.offsetX, e.offsetY);
});
window.addEventListener('touchstart', (e) => {
  const rect = canvas.getBoundingClientRect();
  const touchX = e.touches[0].clientX - rect.left;
  const touchY = e.touches[0].clientY - rect.top;
  handleInput(touchX, touchY);
});

loop();
</script>
</body>
</html>
