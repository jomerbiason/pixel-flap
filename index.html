<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel Flap</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #70c5ce;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
}

canvas {
  background: #70c5ce;
  border: 2px solid #000;
}
</style>
</head>

<body>
<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// STATES
let state = "menu";
let bird, pipes, frame, score;
let highScore = localStorage.getItem("highScore") || 0;
let menuAnimation = 0;

// GAME SLOW-MOTION FLAG
let waitingForFirstFlap = false;

// RESET GAME
function resetGame() {
  bird = { x: 50, y: 150, width: 20, height: 20, gravity: 0.5, lift: -8, velocity: 0 };
  pipes = [];
  frame = 0;
  score = 0;
  waitingForFirstFlap = true; // start in slow motion
}

// DRAW
function drawBird() {
  ctx.fillStyle = 'yellow';
  ctx.fillRect(bird.x, bird.y, bird.width, bird.height);
}

function drawPipes() {
  ctx.fillStyle = 'green';
  pipes.forEach(pipe => {
    ctx.fillRect(pipe.x, 0, pipe.width, pipe.top);
    ctx.fillRect(pipe.x, canvas.height - pipe.bottom, pipe.width, pipe.bottom);
  });
}

// DRAW SCORE
function drawScore() {
  ctx.font = '20px Arial';
  ctx.fillStyle = 'white';
  ctx.fillText('High Score: ' + highScore, 10, 25);
  ctx.fillText('Score: ' + score, 10, 50);
}

// UPDATE
function updateBird() {
  if (waitingForFirstFlap) {
    bird.velocity += bird.gravity * 0.05; // super slow motion
  } else {
    bird.velocity += bird.gravity;
  }
  bird.velocity = Math.min(bird.velocity, 10);
  bird.y += bird.velocity;

  if (bird.y + bird.height >= canvas.height || bird.y <= 0) {
    state = "gameover";
  }
}

function updatePipes() {
  if (frame % 90 === 0) {
    let minTop = 50;
    let maxTop = canvas.height - 50 - 150; // 150 is the gap
    let top = Math.random() * (maxTop - minTop) + minTop;
    let gap = 150; // wider gap for easier passage
    let bottom = canvas.height - top - gap;
    pipes.push({ x: canvas.width, width: 40, top, bottom, passed: false });
  }

  pipes.forEach(pipe => {
    pipe.x -= waitingForFirstFlap ? 0.2 : 2; // super slow motion before first flap

    // Collision
    if (
      bird.x < pipe.x + pipe.width &&
      bird.x + bird.width > pipe.x &&
      (bird.y < pipe.top || bird.y + bird.height > canvas.height - pipe.bottom)
    ) {
      state = "gameover";
    }

    // Score
    if (!pipe.passed && pipe.x + pipe.width < bird.x) {
      score++;
      pipe.passed = true;
    }
  });

  pipes = pipes.filter(pipe => pipe.x + pipe.width > 0);
}

// UI SCREENS
function drawMenu() {
  menuAnimation += 0.03;
  let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
  gradient.addColorStop(0, "#70c5ce");
  gradient.addColorStop(1, "#4ec0ca");
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  let floatY = Math.sin(menuAnimation) * 10;
  ctx.fillStyle = "yellow";
  ctx.fillRect(180, 180 + floatY, 20, 20);

  ctx.globalAlpha = Math.min(1, menuAnimation / 2);
  ctx.fillStyle = "black";
  ctx.font = "40px Arial";
  ctx.fillText("PIXEL FLAP", 80, 120);
  ctx.globalAlpha = 1;

  let pulse = Math.sin(menuAnimation * 3) * 0.5 + 0.5;
  ctx.globalAlpha = 0.5 + pulse * 0.5;
  ctx.font = "22px Arial";
  ctx.fillText("Press any key / tap to start", 50, 300);
  ctx.globalAlpha = 1;

  ctx.font = "18px Arial";
  ctx.fillText("High Score: " + highScore, 10, 25);
}

function drawGameScreen() {
  drawBird();
  drawPipes();
  drawScore();

  if (waitingForFirstFlap) {
    ctx.fillStyle = 'black';
    ctx.font = '22px Arial';
    ctx.fillText("Tap to flap", 140, 550);
  }
}

function drawGameOver() {
  ctx.fillStyle = 'black';
  ctx.font = '30px Arial';
  ctx.fillText('Game Over', 110, 220);

  ctx.font = '20px Arial';
  ctx.fillText('High Score: ' + highScore, 110, 270);
  ctx.fillText('Score: ' + score, 140, 310);

  if (score >= highScore) {
    if (Math.floor(frame / 10) % 2 === 0) {
      ctx.fillStyle = 'red';
      ctx.font = '22px Arial';
      ctx.fillText('NEW HIGH SCORE!', 100, 180);
    }
  }

  ctx.fillStyle = 'black';
  ctx.font = '20px Arial';
  ctx.fillText('Press any key / tap to Restart', 70, 360);
  ctx.fillText('Press B to go to Menu', 90, 400);
}

// LOOP
function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (state === "menu") drawMenu();
  else if (state === "playing") {
    drawGameScreen();
    updateBird();
    updatePipes();
    frame++;
  } else if (state === "gameover") {
    if (score > highScore) {
      highScore = score;
      localStorage.setItem("highScore", highScore);
    }
    drawGameOver();
  }

  requestAnimationFrame(loop);
}

// CONTROLS
function handleInput() {
  if (state === "menu") {
    resetGame();
    state = "playing";
  } else if (state === "playing") {
    if (waitingForFirstFlap) waitingForFirstFlap = false;
    bird.velocity = bird.lift;
  } else if (state === "gameover") {
    resetGame();
    state = "playing";
  }
}

window.addEventListener('keydown', (e) => {
  if (e.key.toLowerCase() === 'b') {
    state = "menu";
    menuAnimation = 0;
  } else handleInput();
});

window.addEventListener('click', handleInput);
window.addEventListener('touchstart', handleInput);

loop();
</script>
</body>
</html>
